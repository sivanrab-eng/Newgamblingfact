<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Coin Selection Game</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .coin { cursor: pointer; margin: 10px; }\n        .result { margin-top: 20px; }\n        .hidden { display: none; }\n    </style>\n</head>\n<body>\n    <h1>Select Your Coin</h1>\n    <div id="coins">\n        <img src="coin1.png" alt="Coin 1" class="coin" data-value="1">\n        <img src="coin2.png" alt="Coin 2" class="coin" data-value="2">\n        <img src="coin3.png" alt="Coin 3" class="coin" data-value="3">\n    </div>\n    <div class="hidden" id="game">\n        <h2>Submit Your Answer!</h2>\n        <input type="text" id="answerInput" placeholder="Enter your answer">\n        <button id="submitAnswer">Submit</button>\n    </div>\n    <div class="result hidden" id="resultDisplay"></div>\n    <script>\n        let score = 0;\n        let coins = document.querySelectorAll('.coin');\n        let gameDiv = document.getElementById('game');\n        let answerInput = document.getElementById('answerInput');\n        let resultDisplay = document.getElementById('resultDisplay');\n\n        coins.forEach(coin => {\n            coin.addEventListener('click', function() {\n                const value = this.getAttribute('data-value');\n                score += parseInt(value);\n                gameDiv.classList.remove('hidden');\n                alert('Coin selected! Current score: ' + score);\n            });\n        });\n\n        document.getElementById('submitAnswer').addEventListener('click', function() {\n            const answer = answerInput.value;\n            resultDisplay.textContent = 'Your answer: ' + answer + '\nCurrent Score: ' + score;\n            gameDiv.classList.add('hidden');\n            resultDisplay.classList.remove('hidden');\n            answerInput.value = '';\n        });\n    </script>\n</body>\n</html>
